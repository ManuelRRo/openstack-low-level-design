[DEFAULT]
# Logs / State
debug = True
use_journal = True
state_path = /var/lib/nova
service_down_time = 120
# Scheduler
cpu_allocation_ratio = 2.0
disk_allocation_ratio = 1.0
ram_allocation_ratio = 1.0
reserved_host_disk_mb = 2048
reserved_host_memory_mb = 2048
# Compute
compute_driver = libvirt.LibvirtDriver
instances_path = /var/lib/nova/instances
allow_resize_to_same_host = True
# Api's
enabled_apis = osapi_compute,metadata
# Rpc all
transport_url = rabbit://nova:163fe35fb3d32b01a0387db6704be3762be98cc3335494f2a@172.29.239.221:5671/nova?ssl=1&ssl_version=TLSv1_2&ssl_ca_file=
# Network
my_ip = 172.29.236.12
# Hypervisor
default_ephemeral_format = ext4
# Ceilometer notification configurations
instance_usage_audit = True
instance_usage_audit_period = hour
# Notifications

[oslo_messaging_notifications]
topics = notifications
driver = messagingv2
transport_url = rabbit://nova:163fe35fb3d32b01a0387db6704be3762be98cc3335494f2a@172.29.239.221:5671/nova?ssl=1&ssl_version=TLSv1_2&ssl_ca_file=
# Messaging

[oslo_messaging_rabbit]
heartbeat_in_pthread = False
rabbit_quorum_queue = True
rabbit_transient_quorum_queue = True
rabbit_qos_prefetch_count = 10
use_queue_manager = False
rabbit_stream_fanout = True
rabbit_quorum_delivery_limit = 0
rabbit_quorum_max_memory_bytes = 0
# Image cache

[image_cache]
manager_interval = 0
# Cache

[cache]
enabled = true
backend = oslo_cache.memcache_pool
memcache_servers = 172.29.239.254:11211
# Cinder

[cinder]
catalog_info = block-storage:cinder:internalURL
os_region_name = RegionOne
auth_section = keystone_authtoken

[spice]
agent_enabled = True
enabled = False

[vnc]
enabled = True
novncproxy_base_url = https://192.168.31.11:6080/vnc_lite.html
novncproxy_host = 172.29.236.12
novncproxy_port = 6080
server_listen = 172.29.236.12
server_proxyclient_address = 172.29.236.12
auth_schemes = vencrypt,none
vencrypt_client_key = /etc/pki/nova-novncproxy/client-key.pem
vencrypt_client_cert = /etc/pki/nova-novncproxy/client-cert.pem
vencrypt_ca_certs = /etc/pki/nova-novncproxy/ca-cert.pem

[serial_console]
enabled = False
